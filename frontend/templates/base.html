<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' }
                    }
                }
            }
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-50">
    {% block body %}
    <div class="min-h-full">
        <!-- Navbar -->
        <nav class="bg-gradient-to-r from-primary-800 to-primary-900 shadow-lg sticky top-0 z-50">
            <div class="mx-auto max-w-7xl px-3 sm:px-6">
                <div class="flex h-12 sm:h-16 items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-xl sm:text-2xl">📡</span>
                        <div class="hidden sm:block">
                            <h1 class="text-base sm:text-xl font-bold text-white leading-tight">{{ app_name }}</h1>
                            <p class="text-xs text-primary-200">Balmon Kelas II Lampung</p>
                        </div>
                        <div class="sm:hidden">
                            <h1 class="text-sm font-bold text-white leading-tight">Lampung Monitor</h1>
                        </div>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-4">
                        <a href="/dashboard" class="text-primary-200 hover:text-white px-2 sm:px-3 py-1 sm:py-2 rounded-md text-xs sm:text-sm font-medium">📊 Dashboard</a>
                        <a href="/admin" id="nav-admin" class="hidden text-primary-200 hover:text-white px-2 sm:px-3 py-1 sm:py-2 rounded-md text-xs sm:text-sm font-medium">⚙️ Admin</a>
                        <div class="relative">
                            <button id="userMenuBtn" class="flex items-center gap-1 text-white text-xs sm:text-sm">
                                <span id="userName" class="hidden md:inline">User</span>
                                <span class="bg-primary-600 rounded-full w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center text-xs font-bold" id="userAvatar">U</span>
                            </button>
                            <div id="userMenu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
                                <div class="px-4 py-2 text-sm text-gray-700 border-b" id="userMenuInfo"></div>
                                <button onclick="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">🚪 Keluar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="mx-auto max-w-7xl px-3 sm:px-6 py-3 sm:py-6">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t mt-4 sm:mt-8 py-3 sm:py-4">
            <div class="mx-auto max-w-7xl px-3 text-center text-xs text-gray-400">
                <p>{{ app_name }} v1.0 — Balmon Kelas II Lampung</p>
            </div>
        </footer>
    </div>
    {% endblock %}
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
