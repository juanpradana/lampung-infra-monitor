<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                    },
                },
            },
        }
    </script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Dark Mode Initialization Script (before body renders) -->
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 dark:bg-slate-900 font-sans">
    {% block body %}
    <div class="min-h-full flex flex-col">

        <!-- Navbar -->
        <nav class="bg-gradient-to-r from-primary-800 to-primary-900 shadow-lg sticky top-0 z-50">
            <div class="mx-auto max-w-7xl px-3 sm:px-6">
                <div class="flex h-12 sm:h-16 items-center justify-between">

                    <!-- Left: Logo & App Name -->
                    <div class="flex items-center gap-2">
                        <!-- Signal Icon -->
                        <svg class="w-6 h-6 sm:w-7 sm:h-7 text-white flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 20h.01"/>
                            <path d="M7 20v-4"/>
                            <path d="M12 20v-8"/>
                            <path d="M17 20V8"/>
                        </svg>
                        <div class="hidden sm:block">
                            <h1 class="text-base sm:text-xl font-bold text-white leading-tight">Lampung Infra Monitor</h1>
                            <p class="text-xs text-primary-200">Balmon Kelas II Lampung</p>
                        </div>
                        <div class="sm:hidden">
                            <h1 class="text-sm font-bold text-white leading-tight">Lampung Monitor</h1>
                        </div>
                    </div>

                    <!-- Right: Nav Links, Dark Mode Toggle, User Menu -->
                    <div class="flex items-center gap-1 sm:gap-3">

                        <!-- Dashboard Link -->
                        <a href="/dashboard" class="flex items-center gap-1.5 text-primary-200 hover:text-white px-2 sm:px-3 py-1 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors">
                            <!-- LayoutDashboard Icon -->
                            <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="7" height="9" x="3" y="3" rx="1"/>
                                <rect width="7" height="5" x="14" y="3" rx="1"/>
                                <rect width="7" height="9" x="14" y="12" rx="1"/>
                                <rect width="7" height="5" x="3" y="16" rx="1"/>
                            </svg>
                            <span>Dashboard</span>
                        </a>

                        <!-- Aduan Link -->
                        <a href="/aduan" class="flex items-center gap-1.5 text-primary-200 hover:text-white px-2 sm:px-3 py-1 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors">
                            <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8Z"/>
                                <path d="M15 3v4a2 2 0 0 0 2 2h4"/>
                                <path d="M10 14h4"/>
                                <path d="M10 18h4"/>
                                <path d="M10 8h4"/>
                            </svg>
                            <span>Aduan</span>
                        </a>

                        <!-- Admin Link (superadmin only) -->
                        <a href="/admin" id="nav-admin" class="hidden items-center gap-1.5 text-primary-200 hover:text-white px-2 sm:px-3 py-1 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors">
                            <!-- Settings Icon -->
                            <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <span>Admin</span>
                        </a>

                        <!-- Dark Mode Toggle -->
                        <button id="darkModeToggle" type="button"
                            class="relative p-1.5 sm:p-2 rounded-md text-primary-200 hover:text-white hover:bg-primary-700/50 transition-colors"
                            aria-label="Toggle dark mode">
                            <!-- Sun Icon (shown in dark mode) -->
                            <svg class="w-5 h-5 hidden dark:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="4"/>
                                <path d="M12 2v2"/>
                                <path d="M12 20v2"/>
                                <path d="m4.93 4.93 1.41 1.41"/>
                                <path d="m17.66 17.66 1.41 1.41"/>
                                <path d="M2 12h2"/>
                                <path d="M20 12h2"/>
                                <path d="m6.34 17.66-1.41 1.41"/>
                                <path d="m19.07 4.93-1.41 1.41"/>
                            </svg>
                            <!-- Moon Icon (shown in light mode) -->
                            <svg class="w-5 h-5 block dark:hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                            </svg>
                        </button>

                        <!-- User Menu -->
                        <div class="relative">
                            <button id="userMenuBtn" class="flex items-center gap-1.5 text-white text-xs sm:text-sm rounded-md px-1.5 py-1 hover:bg-primary-700/50 transition-colors">
                                <span id="userName" class="hidden md:inline font-medium">User</span>
                                <span class="bg-primary-600 rounded-full w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center text-xs font-bold" id="userAvatar">U</span>
                                <!-- ChevronDown Icon -->
                                <svg class="w-4 h-4 hidden sm:block text-primary-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6"/>
                                </svg>
                            </button>
                            <div id="userMenu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-slate-800 rounded-lg shadow-lg py-1 z-50 border border-gray-200 dark:border-slate-700">
                                <div class="px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 border-b border-gray-100 dark:border-slate-700 font-medium" id="userMenuInfo"></div>
                                <button onclick="logout()" class="flex items-center gap-2 w-full text-left px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
                                    <!-- LogOut Icon -->
                                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" x2="9" y1="12" y2="12"/>
                                    </svg>
                                    <span>Keluar</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 mx-auto max-w-7xl w-full px-3 sm:px-6 py-3 sm:py-6">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 py-3 sm:py-4 mt-4 sm:mt-8">
            <div class="mx-auto max-w-7xl px-3 text-center text-xs text-gray-400 dark:text-gray-500">
                <p>Lampung Infra Monitor v2.0 — Balmon Kelas II Lampung</p>
            </div>
        </footer>
    </div>
    {% endblock %}

    <!-- App JS -->
    <script src="/static/js/app.js"></script>

    <!-- Dark Mode Toggle Script -->
    <script>
        (function () {
            const toggle = document.getElementById('darkModeToggle');
            if (!toggle) return;

            toggle.addEventListener('click', function () {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
