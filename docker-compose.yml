version: '3.8'

services:
  app:
    build: .
    container_name: lampung-infra-monitor
    ports:
      - "8032:8032"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - APP_PORT=8032
      - DATABASE_URL=sqlite:///data/lampung_monitor.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/health"]
      interval: 30s
      timeout: 10s
      retries: 3
